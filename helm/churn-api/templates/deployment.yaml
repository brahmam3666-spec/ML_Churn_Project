apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: churn-api
  template:
    metadata:
      labels:
        app: churn-api
    spec:
      containers:
        - name: churn-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 5000